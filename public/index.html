<!DOCTYPE html>

<html lang="en">

<head>

  <!-- ===================================== -->
  <!-- BASIC -->
  <!-- ===================================== -->

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      maximum-scale=1,
      viewport-fit=cover
    "
  />

  <meta
    http-equiv="X-UA-Compatible"
    content="IE=edge"
  />

  <!-- ===================================== -->
  <!-- TITLE -->
  <!-- ===================================== -->

  <title>
    Gudur — Tech Universe
  </title>

  <!-- ===================================== -->
  <!-- SEO -->
  <!-- ===================================== -->

  <meta
    name="description"
    content="
      Gudur Tech Universe brings together learning, spirituality, marketplace, community services and futuristic digital experiences in one premium ecosystem.
    "
  />

  <meta
    name="keywords"
    content="
      Gudur,
      Tech Village,
      KidLab,
      Bhagavad Gita,
      Marketplace,
      Science Learning,
      Village Apps,
      Vidhwaan,
      Community Platform
    "
  />

  <meta
    name="author"
    content="Vidhwaan"
  />

  <meta
    name="robots"
    content="
      index,
      follow,
      max-image-preview:large
    "
  />

  <link
    rel="canonical"
    href="https://gudur.vidhwaan.com/"
  />

  <!-- ===================================== -->
  <!-- THEME -->
  <!-- ===================================== -->

  <meta
    name="theme-color"
    content="#07111f"
  />

  <meta
    name="mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <meta
    name="apple-mobile-web-app-title"
    content="Gudur"
  />

  <!-- ===================================== -->
  <!-- OPEN GRAPH -->
  <!-- ===================================== -->

  <meta
    property="og:type"
    content="website"
  />

  <meta
    property="og:url"
    content="https://gudur.vidhwaan.com/"
  />

  <meta
    property="og:title"
    content="
      Gudur — Tech Universe
    "
  />

  <meta
    property="og:description"
    content="
      The futuristic tech ecosystem of Gudur.
    "
  />

  <meta
    property="og:image"
    content="
      https://gudur.vidhwaan.com/icons/icon-512.png
    "
  />

  <!-- ===================================== -->
  <!-- TWITTER -->
  <!-- ===================================== -->

  <meta
    name="twitter:card"
    content="summary_large_image"
  />

  <meta
    name="twitter:title"
    content="
      Gudur Tech Universe
    "
  />

  <meta
    name="twitter:description"
    content="
      Learning, Marketplace, Spirituality and Community Apps
    "
  />

  <meta
    name="twitter:image"
    content="
      https://gudur.vidhwaan.com/icons/icon-512.png
    "
  />

  <!-- ===================================== -->
  <!-- ICONS -->
  <!-- ===================================== -->

  <link
    rel="icon"
    href="./favicon.ico"
    sizes="any"
  />

  <link
    rel="apple-touch-icon"
    href="./icons/icon-192.png"
  />

  <!-- ===================================== -->
  <!-- PWA -->
  <!-- ===================================== -->

  <link
    rel="manifest"
    href="./manifest.json"
  />

  <!-- ===================================== -->
  <!-- CSS -->
  <!-- ===================================== -->

  <link
    rel="stylesheet"
    href="./main.css"
  />

</head>

<body>



  <!-- ===================================== -->
  <!-- BACKGROUND -->
  <!-- ===================================== -->



  <!-- ===================================== -->
  <!-- APP -->
  <!-- ===================================== -->

  <main id="app">

    <!-- ================================= -->
    <!-- HERO -->
    <!-- ================================= -->

    <section class="heroSection">

      <div class="heroLogoWrap">

        <img
          src="./icons/logo.png"
          alt="Gudur Logo"
          class="heroLogo"
        />

      </div>

      <div class="heroContent">

        <div class="heroBadge">
          GUDUR TECH UNIVERSE
        </div>

        <h1>
          The Future Tech Ecosystem Of Gudur
        </h1>

        <p class="heroText">
          “Our Village. Our Services. Our Technology. Our Future.”
        </p>

      </div>

    </section>

    <!-- ================================= -->
    <!-- FEATURED -->
    <!-- ================================= -->

    <section class="sectionBlock">

      <div class="sectionTitleWrap">

        <h2>
          Featured Experience
        </h2>

      </div>

      <div id="featuredApp"></div>

    </section>

    <!-- ================================= -->
    <!-- APPS -->
    <!-- ================================= -->

    <section class="sectionBlock">

      <div class="sectionTitleWrap">

        <h2>
          Gudur Apps
        </h2>

      </div>

      <div id="appsGrid"></div>

    </section>



    <!-- ================================= -->
    <!-- GOVERNMENT SERVICES -->
    <!-- ================================= -->

    <section class="sectionBlock">

      <div class="sectionTitleWrap">

        <h2>
          Government Services
        </h2>

      </div>

      <div id="governmentGrid"></div>

    </section>

    <!-- ================================= -->
    <!-- TOLL FREE NUMBERS -->
    <!-- ================================= -->

    <section class="sectionBlock">

      <div class="sectionTitleWrap">

        <h2>
          Emergency & Toll Free Numbers
        </h2>

      </div>

      <div id="tollGrid"></div>

    </section>




    <!-- ================================= -->
    <!-- NOTIFICATIONS -->
    <!-- ================================= -->

    <section
      class="sectionBlock"
      id="notificationsSection"
    >

      <div class="sectionTitleWrap">

        <h2>
          Notifications
        </h2>

      </div>

      <div id="notificationsFeed"></div>

    </section>

    <!-- ================================= -->
    <!-- FOOTER -->
    <!-- ================================= -->

    <footer id="footer">

      <img
        src="./icons/logo.png"
        alt="Gudur"
        class="footerLogo"
      />

      <p>
        Built For The Future Of Gudur
      </p>

    </footer>

  </main>

  <!-- ===================================== -->
  <!-- INSTALL BUTTON -->
  <!-- ===================================== -->

  <button id="installBtn">
    Install App
  </button>

  <!-- ===================================== -->
  <!-- APP -->
  <!-- ===================================== -->

  <script
    src="./app.js"
    defer
  ></script>

</body>

</html>
